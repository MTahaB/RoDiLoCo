# Free-tier DiLoCo config — sized to run comfortably on a single Kaggle/Colab T4 (16 GB)
# within the 30 GPU-hrs/week quota. ~10 M-param char-level model on a TinyStories subset.
#
# Usage patterns:
#   * P2 baseline:  aggregator=mean, attack=none
#   * P3 attack:    aggregator=mean, attack=sign_flip, n_byzantine=1..3
#   * P4 defense:   aggregator=trust_weighted|krim|..., attack=sign_flip
# Override any field from the CLI or the notebook (see notebooks/run_on_kaggle.ipynb).
#
# Kill-switch (plan #2): if a run overruns quota, drop n_workers to 4 and/or halve d_model.
# The research question survives reduced scale; the writeup states it as a limitation.

seed: 0
device: auto
seq_len: 128
batch_size: 32

# point at the TinyStories subset produced by scripts/prepare_data.py.
# if the file is missing the loop falls back to a tiny built-in corpus (debug only).
text_path: data/tinystories_train.txt

n_workers: 8
iid: true
H: 125                 # inner steps/worker/round; sweep {50, 125, 500} for the P2 comm plot
outer_rounds: 40
inner_lr: 1.0e-3
outer_lr: 0.7          # sweep {0.3, 0.5, 0.7, 1.0} if the DiLoCo–sync gap does not close
outer_momentum: 0.9    # Nesterov
weight_decay: 0.1
grad_clip: 1.0

aggregator: mean
attack: none
n_byzantine: 0
attack_lam: 10.0
attack_sigma_mult: 10.0

eval_every: 5
eval_batches: 20
out_dir: outputs/free_tier
model:
  d_model: 384
  n_layers: 6
  n_heads: 6
  max_seq_len: 128
