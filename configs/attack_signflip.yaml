# Phase 3 — fragility of vanilla DiLoCo under a sign-flip attack.
# Grid axis: sweep n_byzantine in {0, 1, 2, 3} against aggregator=mean.
seed: 0
device: auto
seq_len: 64
batch_size: 16

n_workers: 8
iid: true
H: 125
outer_rounds: 40          # ~1/3 the baseline token budget: measure relative degradation
inner_lr: 3.0e-3
outer_lr: 0.7
outer_momentum: 0.9
weight_decay: 0.1
grad_clip: 1.0

aggregator: mean
attack: sign_flip          # {sign_flip, scaled_noise, targeted_drift}
attack_lam: 10.0
n_byzantine: 1             # <- the "one liar in eight" knob

eval_every: 5
eval_batches: 10
out_dir: outputs/attack_signflip_f1
model:
  d_model: 128
  n_layers: 3
  n_heads: 4
  max_seq_len: 64
